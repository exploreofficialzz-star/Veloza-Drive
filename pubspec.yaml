name: veloza_drive
description: Veloza Drive — Realistic Car Challenge Racing Game by ChAs Tech Group
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0
  flame_audio: ^2.10.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Storage
  shared_preferences: ^2.3.2

  # State Management
  provider: ^6.1.2

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Navigation
  go_router: ^14.2.7

  # UI / Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # App info
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
